<!DOCTYPE html>
<html>
<head>
<title>Habit Tracker</title>

<style>

body{
font-family: Arial;
background-color:#e6f6ff;
text-align:center;
}

.container{
width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h1{
color:black;
}

input{
padding:10px;
width:70%;
border:1px solid gray;
}

button{
padding:10px;
background-color:skyblue;
border:none;
cursor:pointer;
}

ul{
list-style:none;
padding:0;
}

li{
background:black;
color:white;
margin:10px;
padding:10px;
border-radius:5px;
display:flex;
justify-content:space-between;
}

.done{
text-decoration:line-through;
background:gray;
}

</style>

</head>

<body>

<div class="container">

<h1>Habit Tracker</h1>

<input type="text" id="taskInput" placeholder="Enter habit or task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>

<script>

function addTask(){

let taskInput=document.getElementById("taskInput");
let taskText=taskInput.value;

if(taskText==="") return;

let li=document.createElement("li");

li.innerHTML = taskText + 
" <button onclick='completeTask(this)'>Done</button>";

document.getElementById("taskList").appendChild(li);

taskInput.value="";
}

function completeTask(button){

let li=button.parentElement;
li.classList.toggle("done");

}

</script>

</body>
</html>
